name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake Animations (to local dist/)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Keerthana-Vinod
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated SVGs
        run: |
          echo "Files in dist/:"
          ls -la dist/
          echo "Light SVG size: $(wc -c < dist/github-contribution-grid-snake.svg) bytes"
          echo "Dark SVG size:  $(wc -c < dist/github-contribution-grid-snake-dark.svg) bytes"

      - name: Push SVGs to output branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "chore: update contribution snake SVGs [skip ci]"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Keerthana-Vinod/Keerthana-Vinod.git" \
            HEAD:output
          echo "Done! SVGs pushed to output branch."